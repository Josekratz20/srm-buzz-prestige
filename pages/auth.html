<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRM Hub | Login & Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --srm-blue: #0f172a;
            --srm-gold: #FFD700;
            --jumia-blue: #3b5998;
            --jumia-bg: #fff;
            --jumia-text: #282828;
            --jumia-border: #dbdbdb;
        }

        body { 
            background-color: var(--jumia-bg); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; color: var(--jumia-text);
        }

        .auth-container {
            width: 100%; max-width: 400px; padding: 20px;
            text-align: center; box-sizing: border-box;
        }

        .logo-circle {
            width: 80px; height: 80px; background: #fff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden; border: 1px solid var(--jumia-border);
        }
        .logo-circle img { width: 70%; height: auto; }

        h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 10px; color: var(--jumia-text); }
        p.subtitle { font-size: 0.95rem; color: #757575; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group label { 
            position: absolute; top: -10px; left: 12px; background: #fff; padding: 0 5px;
            font-size: 0.75rem; color: var(--srm-blue); font-weight: 700; z-index: 1;
        }
        .auth-input { 
            width: 100%; padding: 16px 14px; border: 1.5px solid var(--srm-blue); 
            border-radius: 4px; font-size: 1rem; box-sizing: border-box; font-family: 'Roboto', sans-serif;
        }
        .auth-input:focus { outline: none; border-color: var(--srm-gold); border-width: 2px; }
        .auth-input::placeholder { color: #bdbdbd; font-weight: 300; }

        .auth-btn { 
            width: 100%; padding: 16px; background-color: var(--srm-blue); 
            color: var(--srm-gold); border: none; border-radius: 4px; font-weight: 700; 
            font-size: 1rem; cursor: pointer; box-shadow: 0 4px 8px rgba(15, 23, 42, 0.2);
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .auth-btn:hover { background-color: #1e293b; transform: translateY(-1px); box-shadow: 0 6px 12px rgba(15, 23, 42, 0.3); }

        .divider { 
            display: flex; align-items: center; margin: 35px 0; color: #9e9e9e; font-size: 0.85rem;
        }
        .divider::before, .divider::after { 
            content: ""; flex: 1; height: 1px; background: #eeeeee; 
        }
        .divider span { padding: 0 15px; }

        .social-login { display: flex; justify-content: center; gap: 20px; align-items: center; }
        .social-btn { 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; border-radius: 50%; border: 1px solid #f0f0f0;
        }
        .social-btn:hover { transform: scale(1.15); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .footer-text { margin-top: 40px; font-size: 0.75rem; color: #757575; line-height: 1.6; }
        .footer-text a { color: var(--srm-blue); text-decoration: none; font-weight: 700; }

        /* Signup extensions */
        .signup-only { display: none; margin-bottom: 25px; }
        .auth-toggle { margin-top: 25px; color: var(--srm-blue); cursor: pointer; font-size: 0.9rem; font-weight: 700; }
        .auth-toggle:hover { text-decoration: underline; color: var(--srm-gold); }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- TOP ICON -->
        <div class="logo-circle">
            <img src="/images/logo.png" alt="Logo">
        </div>

        <h1 id="formTitle">Welcome to SRM Hub</h1>
        <p class="subtitle" id="formSubtitle">Use your email or mobile number to log in or sign up.</p>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div id="nameGroup" class="signup-only">
                <div class="input-group">
                    <label>Full Name*</label>
                    <input type="text" id="authName" class="auth-input" placeholder="e.g. Erick Masaba">
                </div>
            </div>

            <div class="input-group">
                <label>Email or Mobile Number*</label>
                <input type="text" id="authEmail" class="auth-input" placeholder=" " required>
            </div>

            <div class="input-group" id="passGroup">
                <label>Password*</label>
                <input type="password" id="authPass" class="auth-input" placeholder=" " required>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">Continue</button>
        </form>

        <div class="divider">
            <span>Or log in with</span>
        </div>

        <div class="social-login">
            <!-- FACEBOOK -->
            <div class="social-btn">
                <svg width="34" height="34" viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="17" fill="#1877F2"/><path d="M22.5 17H20V25H16V17H14V14H16V12C16 10.3 17.3 9 19 9H22V12H20C19.5 12 19 12.5 19 13V14H22.5L22.5 17Z" fill="white"/></svg>
            </div>
            <!-- GOOGLE -->
            <div class="social-btn">
                <svg width="34" height="34" viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="17" fill="white" stroke="#E0E0E0"/><path d="M24.5 17.2c0-.5-.1-.9-.2-1.3H17v2.6h4.2c-.2.9-.8 1.7-1.5 2.2v1.8h2.4c1.4-1.3 2.4-3.2 2.4-5.3z" fill="#4285F4"/><path d="M17 24.8c2.1 0 3.9-.7 5.2-1.9l-2.4-1.8c-.7.5-1.6.8-2.8.8-2.1 0-4-1.4-4.6-3.4H9.9v1.9c1.4 2.8 4.2 4.4 7.1 4.4z" fill="#34A853"/><path d="M12.4 18.5c-.2-.5-.3-1.1-.3-1.7s.1-1.2.3-1.7V13.2H9.9C9.3 14.4 9 15.6 9 17s.3 2.6.9 3.8l2.5-2.3z" fill="#FBBC05"/><path d="M17 11.7c1.2 0 2.2.4 3 1.1l2.3-2.3c-1.4-1.3-3.3-2.1-5.3-2.1-2.9 0-5.7 1.6-7.1 4.4l2.5 1.9c.6-2 2.5-3 4.6-3z" fill="#EA4335"/></svg>
            </div>
        </div>

        <p class="auth-toggle" id="formToggle" onclick="toggleMode()">Are you new here? Register here.</p>

        <div class="footer-text">
            By continuing you agree to SRM Hub's <br>
            <a href="#">Terms and Conditions</a>
        </div>
    </div>

    <script>
        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const sub = document.getElementById('formSubtitle');
            const btn = document.getElementById('submitBtn');
            const toggle = document.getElementById('formToggle');
            const nameGroup = document.getElementById('nameGroup');
            const nameField = document.getElementById('authName');

            if (isSignup) {
                title.innerText = "Register Your Account";
                sub.innerText = "Become a member of the SRM Hub to start your journey.";
                btn.innerText = "Continue to Join";
                toggle.innerText = "Already have an account? Log in here.";
                nameGroup.style.display = 'block';
                nameField.required = true;
            } else {
                title.innerText = "Welcome to SRM Hub";
                sub.innerText = "Use your email or mobile number to log in or sign up.";
                btn.innerText = "Continue";
                toggle.innerText = "Are you new here? Register here.";
                nameGroup.style.display = 'none';
                nameField.required = false;
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Please Wait...";
            btn.disabled = true;

            const url = isSignup ? 'https://srm-buzz-prestige.onrender.com/api/users/signup' : 'https://srm-buzz-prestige.onrender.com/api/users/login';
            const body = {
                email: document.getElementById('authEmail').value,
                password: document.getElementById('authPass').value
            };
            if(isSignup) body.name = document.getElementById('authName').value;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.success) {
                    if (isSignup) {
                        alert("✨ Sanctuary registration successful! You can now log in.");
                        isSignup = true; toggleMode(); // Reset to login
                    } else {
                        localStorage.setItem('srmUserToken', data.token);
                        localStorage.setItem('srmUserName', data.name);
                        const params = new URLSearchParams(window.location.search);
                        const redirect = params.get('redirect') || '/';
                        window.location.href = redirect;
                    }
                } else {
                    alert("❌ " + data.message);
                }
            } catch (e) {
                alert("❌ Connection failed. Ensure the server is running!");
            } finally {
                btn.innerText = isSignup ? "Continue to Join" : "Continue";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
