<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRM | Join the Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=auth">
    <style>
        body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .auth-container { 
            background: #fff; width: 90%; max-width: 380px; padding: 40px 30px; 
            border-radius: 30px; box-shadow: 0 50px 100px rgba(0,0,0,0.5); 
            text-align: center; color: #0f172a; position: relative; z-index: 10;
        }
        .auth-title { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; color: #b45309; }
        .auth-input { width: 100%; padding: 18px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; font-family: 'Poppins'; font-size: 1rem; }
        .auth-btn { width: 100%; padding: 20px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1rem; letter-spacing: 2px; }
        .auth-btn:hover { background: #b45309; box-shadow: 0 10px 30px rgba(180, 83, 9, 0.4); }
        .auth-toggle { margin-top: 30px; cursor: pointer; color: #b45309; font-weight: 700; opacity: 0.8; }
        
        .social-row { display: flex; justify-content: center; gap: 20px; margin-top: 40px; border-top: 1px solid #f1f5f9; padding-top: 30px; }
        .social-icon { width: 40px; height: 40px; opacity: 0.6; transition: 0.3s; }
        .social-icon:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="auth-title" id="formTitle">The Sanctuary</h1>
        <p id="formSubtitle" style="margin-bottom: 40px; opacity: 0.6;">Login to unlock official merchandise, stories, and the registers.</p>

        <form id="authForm" onsubmit="handleAuth(event)">
            <input type="text" id="authName" class="auth-input" placeholder="Your Name" style="display:none;">
            <input type="email" id="authEmail" class="auth-input" placeholder="Email Address" required>
            <input type="password" id="authPass" class="auth-input" placeholder="Secret Key" required>
            <button type="submit" class="auth-btn" id="submitBtn">UNLOCK ACCESS 🔓</button>
        </form>

        <p class="auth-toggle" id="formToggle" onclick="toggleMode()">Are you new here? Sign up for the Sanctuary.</p>

        <div class="social-row">
            <a href="https://bit.ly/SrmbuzzYoutube" target="_blank" title="SRM Youtube" style="width: 48px; display: block; opacity: 0.8; transition: 0.3s;" onmouseover="this.style.opacity='1'; this.style.transform='scale(1.1)'" onmouseout="this.style.opacity='0.8'; this.style.transform='scale(1)'">
                <svg viewBox="0 0 24 24" fill="#FF0000" width="48" height="48"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <a href="https://bit.ly/SrmbuzzFacebook" target="_blank" title="SRM Facebook" style="width: 48px; display: block; margin-left: 20px; opacity: 0.8; transition: 0.3s;" onmouseover="this.style.opacity='1'; this.style.transform='scale(1.1)'" onmouseout="this.style.opacity='0.8'; this.style.transform='scale(1)'">
                <svg viewBox="0 0 24 24" fill="#1877F2" width="48" height="48"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
        </div>
    </div>

    <script>
        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const sub = document.getElementById('formSubtitle');
            const btn = document.getElementById('submitBtn');
            const toggle = document.getElementById('formToggle');
            const nameField = document.getElementById('authName');

            if (isSignup) {
                title.innerText = "Become a Member";
                sub.innerText = "Join the Prestige Era and unlock exclusive content.";
                btn.innerText = "JOIN THE SANCTUARY ✨";
                toggle.innerText = "Already have access? Log in here.";
                nameField.style.display = 'block';
                nameField.required = true;
            } else {
                title.innerText = "The Sanctuary";
                sub.innerText = "Login to unlock official merchandise, stories, and the registers.";
                btn.innerText = "UNLOCK ACCESS 🔓";
                toggle.innerText = "Are you new here? Sign up for the Sanctuary.";
                nameField.style.display = 'none';
                nameField.required = false;
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ PROCESSING...";
            btn.disabled = true;

            const url = isSignup ? '/api/users/signup' : '/api/users/login';
            const body = {
                email: document.getElementById('authEmail').value,
                password: document.getElementById('authPass').value
            };
            if(isSignup) body.name = document.getElementById('authName').value;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.success) {
                    if (isSignup) {
                        alert("✨ Registered! You can now log in.");
                        isSignup = true; toggleMode(); // Reset to login
                    } else {
                        localStorage.setItem('srmUserToken', data.token);
                        localStorage.setItem('srmUserName', data.name);
                        const params = new URLSearchParams(window.location.search);
                        const redirect = params.get('redirect') || '/';
                        window.location.href = redirect;
                    }
                } else {
                    alert("❌ " + data.message);
                }
            } catch (e) {
                alert("❌ Connection failed.");
            } finally {
                btn.innerText = isSignup ? "JOIN THE SANCTUARY ✨" : "UNLOCK ACCESS 🔓";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
