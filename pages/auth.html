<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRM | Member Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=auth">
    <style>
        body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* Ambient Background Elements */
        .ambient-glow {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(180, 83, 9, 0.15) 0%, transparent 70%);
            z-index: 1; top: -100px; right: -100px; border-radius: 50%;
        }
        .ambient-glow-2 {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            z-index: 1; bottom: -50px; left: -50px; border-radius: 50%;
        }

        .auth-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 450px; padding: 60px 40px; 
            border-radius: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); 
            text-align: center; color: #fff; position: relative; z-index: 10;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 5px; color: var(--accent-gold); }
        .auth-subtitle { opacity: 0.6; font-size: 1rem; margin-bottom: 40px; }

        .auth-input-group { margin-bottom: 20px; text-align: left; }
        .auth-input-group label { display: block; font-size: 0.8rem; letter-spacing: 1px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 10px; margin-left: 5px; font-weight: 700; }

        .auth-input { 
            width: 100%; padding: 18px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; font-family: 'Poppins'; font-size: 1rem; color: #fff;
            transition: 0.3s; box-sizing: border-box;
        }
        .auth-input:focus { outline: none; border-color: var(--accent-gold); background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }

        .auth-btn { 
            width: 100%; padding: 20px; background: linear-gradient(135deg, var(--accent-gold), #92400e); 
            color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; 
            font-size: 1rem; letter-spacing: 2px; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(180, 83, 9, 0.3); transition: 0.3s;
            margin-top: 20px;
        }
        .auth-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(180, 83, 9, 0.5); filter: brightness(1.2); }

        .auth-toggle { margin-top: 30px; cursor: pointer; font-weight: 700; color: var(--accent-gold); }
        .auth-toggle:hover { text-decoration: underline; }

        .back-home { position: absolute; top: 40px; left: 40px; color: #fff; text-decoration: none; font-weight: 700; font-size: 0.9rem; opacity: 0.6; transition: 0.3s; }
        .back-home:hover { opacity: 1; transform: translateX(-5px); }

        @media (max-width: 480px) {
            .auth-card { padding: 40px 25px; width: 95%; }
            .auth-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <a href="/" class="back-home">← EXIT PORTAL</a>

    <div class="auth-card">
        <h1 class="auth-title" id="formTitle">Member Login</h1>
        <p class="auth-subtitle" id="formSubtitle">Secure access to the SRM Prestige Hub.</p>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div id="nameGroup" style="display:none;" class="auth-input-group">
                <label>YOUR NAME</label>
                <input type="text" id="authName" class="auth-input" placeholder="e.g. Erick Masaba">
            </div>

            <div class="auth-input-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="authEmail" class="auth-input" placeholder="e.g. srm@hub.org" required>
            </div>

            <div class="auth-input-group">
                <label>SECRET PASSWORD</label>
                <input type="password" id="authPass" class="auth-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">ENTER PORTAL 🔓</button>
        </form>

        <p class="auth-toggle" id="formToggle" onclick="toggleMode()">New to the Hub? Create an Account.</p>
    </div>

    <script>
        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const sub = document.getElementById('formSubtitle');
            const btn = document.getElementById('submitBtn');
            const toggle = document.getElementById('formToggle');
            const nameGroup = document.getElementById('nameGroup');
            const nameField = document.getElementById('authName');

            if (isSignup) {
                title.innerText = "Become a Member";
                sub.innerText = "Join the elite hub of SRM scouters today.";
                btn.innerText = "CREATE ACCOUNT ✨";
                toggle.innerText = "Already a member? Sign in here.";
                nameGroup.style.display = 'block';
                nameField.required = true;
            } else {
                title.innerText = "Member Login";
                sub.innerText = "Secure access to the SRM Prestige Hub.";
                btn.innerText = "ENTER PORTAL 🔓";
                toggle.innerText = "New to the Hub? Create an Account.";
                nameGroup.style.display = 'none';
                nameField.required = false;
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ AUTHENTICATING...";
            btn.disabled = true;

            const url = isSignup ? '/api/users/signup' : '/api/users/login';
            const body = {
                email: document.getElementById('authEmail').value,
                password: document.getElementById('authPass').value
            };
            if(isSignup) body.name = document.getElementById('authName').value;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.success) {
                    if (isSignup) {
                        alert("✨ Sanctuary registration successful! You can now log in.");
                        isSignup = true; toggleMode(); // Reset to login
                    } else {
                        localStorage.setItem('srmUserToken', data.token);
                        localStorage.setItem('srmUserName', data.name);
                        const params = new URLSearchParams(window.location.search);
                        const redirect = params.get('redirect') || '/';
                        window.location.href = redirect;
                    }
                } else {
                    alert("❌ " + data.message);
                }
            } catch (e) {
                alert("❌ Server Connection failed.");
            } finally {
                btn.innerText = isSignup ? "CREATE ACCOUNT ✨" : "ENTER PORTAL 🔓";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
