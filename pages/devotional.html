    <script>
        function SRM_ToggleMenu() {
            const dropdown = document.getElementById("srm-nav-dropdown");
            if (dropdown) dropdown.classList.toggle("active");
        }
        function SRM_ToggleTheme() {
            document.body.classList.toggle("dark-mode");
            const btn = document.getElementById("theme-toggle");
            if (document.body.classList.contains("dark-mode")) {
                localStorage.setItem("theme", "dark");
                if (btn) btn.textContent = "☀️";
            } else {
                localStorage.setItem("theme", "light");
                if (btn) btn.textContent = "🌙";
            }
        }
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark-mode");
                const btn = document.getElementById("theme-toggle");
                if (btn) btn.textContent = "☀️";
            }
        });
    </script>
    <style>
        :root {
            --parchment: #f4ecd8;
            --prestige-gold: #FFD700;
            --prestige-blue: #0f172a;
        }
        body { background: var(--prestige-blue); color: white; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        .hero-banner { 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            padding: 100px 10%; 
            text-align: center; 
            border-bottom: 3px solid var(--prestige-gold);
        }

        /* 2-COLUMN SCROLL GRID */
        .scroll-grid { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 60px 4%; 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 60px;
            min-height: 100vh; 
        }

        .divine-scroll {
            background: var(--parchment);
            color: #2c1e11;
            padding: 40px 50px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border-left: 15px solid #d4c4a8;
            border-right: 15px solid #d4c4a8;
            border-radius: 5px;
            min-height: 350px;
            animation: scrollUnroll 1.2s ease-out;
            border: 2px solid rgba(0,0,0,0.05);
        }

        /* Rolled Edges */
        .divine-scroll::before, .divine-scroll::after {
            content: ''; position: absolute; left: -20px; right: -20px; height: 30px; background: #c2b280; border-radius: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid #8b7355;
        }
        .divine-scroll::before { top: -15px; }
        .divine-scroll::after { bottom: -15px; }

        @keyframes scrollUnroll {
            from { opacity: 0; transform: scaleY(0.1); }
            to { opacity: 1; transform: scaleY(1); }
        }

        .fountain-pen { width: 50px; height: 50px; margin: 0 auto 20px auto; color: #1a1a1a; opacity: 0.8; }

        .scroll-chapter { font-family: 'Playfair Display', serif; font-size: 1.8rem; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 15px; margin-bottom: 25px; text-align: center; font-weight: 800; color: #3e2723; }
        .scroll-body { font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.8; text-align: justify; white-space: pre-wrap; font-weight: 500; }
        
        .listen-btn { background: #3e2723; color: #f4ecd8; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 30px; width: 100%; }
        .listen-btn:hover { background: #000; }
    </style>
</head>

    <div class="scroll-grid" id="scrollWall">
        <div style="grid-column: 1/-1; text-align:center; padding-top:100px;">
            <p style="opacity:0.5; font-size:1.5rem;">📜 UNROLLING THE REGISTER...</p>

    <script>
        async function loadScrolls() {
            const wall = document.getElementById("scrollWall");
            try {
                const res = await fetch("https://srm-buzz-prestige.onrender.com/api/devotionals?v=" + Date.now());
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    wall.innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:100px;'>THE SCROLLS ARE SILENT...</div>";
                    return;
                }

                wall.innerHTML = data.slice().reverse().map((d, index) => `
                    <div class="divine-scroll">
                        <div class="fountain-pen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 19l7-7 3 3-7 7-3-3zM18 13l-1.5-1.5M15.5 10.5l-3-3M13 8l-7-7-2 2 7 7M3 17l4 4-2 2-4-4 2-2z" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <h2 class="scroll-chapter">${d.title}</h2>
                        ${d.verse ? `<p style="text-align:center; font-style:italic; margin-bottom:20px; color:#5d4037;">" ${d.verse} "</p>` : ''}
                        <div id="text-${index}" class="scroll-body">${d.content}</div>
                        ${d.challenge ? `<div style="margin-top:20px; border-top:1px dashed rgba(0,0,0,0.1); padding-top:10px;"><strong>Daily Challenge:</strong> ${d.challenge}</div>` : ''}
                        ${d.prayer ? `<div style="margin-top:10px; font-style:italic; color:#3e2723;"><strong>Prayer:</strong> ${d.prayer}</div>` : ''}
                        <div style="display:flex; gap:10px;">
                            <button class="listen-btn" id="btn-play-${index}" onclick="togglePlay('${index}')">📜 LISTEN TO SCROLL</button>
                            <button class="listen-btn" style="background:#8b0000; display:none;" id="btn-stop-${index}" onclick="stopAudio('${index}')">⏹ QUICK STOP</button>
                        </div>
                    </div>
                `).join("");

            } catch (err) {
                wall.innerHTML = "SYSTEM ERROR";
            }
        }

        let currentUtterance = null;
        let playingIndex = null;

        function togglePlay(idx) {
            const btnPlay = document.getElementById("btn-play-"+idx);
            const btnStop = document.getElementById("btn-stop-"+idx);

            // If a different scroll is playing, stop it first
            if (playingIndex !== null && playingIndex !== idx) {
                stopAudio(playingIndex);
            }

            if (window.speechSynthesis.speaking && playingIndex === idx) {
                if (window.speechSynthesis.paused) {
                    window.speechSynthesis.resume();
                    btnPlay.innerText = "⏸ PAUSE AUDIO";
                } else {
                    window.speechSynthesis.pause();
                    btnPlay.innerText = "▶ RESUME AUDIO";
                }
            } else {
                window.speechSynthesis.cancel();
                const text = document.getElementById("text-"+idx).innerText;
                currentUtterance = new SpeechSynthesisUtterance(text);
                
                currentUtterance.onstart = () => {
                    playingIndex = idx;
                    btnPlay.innerText = "⏸ PAUSE AUDIO";
                    btnStop.style.display = "block";
                };
                
                currentUtterance.onend = () => {
                    playingIndex = null;
                    btnPlay.innerText = "📜 LISTEN TO SCROLL";
                    btnStop.style.display = "none";
                };

                window.speechSynthesis.speak(currentUtterance);
            }
        }

        function stopAudio(idx) {
            window.speechSynthesis.cancel();
            playingIndex = null;
            document.getElementById("btn-play-"+idx).innerText = "📜 LISTEN TO SCROLL";
            document.getElementById("btn-stop-"+idx).style.display = "none";
        }

        window.addEventListener('load', loadScrolls);
    </script>
