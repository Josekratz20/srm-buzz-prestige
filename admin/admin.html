<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SRM Buzz Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .admin-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #38bdf8;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        <h1>Gallery Admin</h1><form id="galleryForm" enctype="multipart/form-data"><input type="file" id="image" name="image" required><br><br><input type="text" id="caption" name="caption" placeholder="Caption" required><br><br><button type="submit">Upload Image</button></form><hr><h2>Uploaded Images</h2><div id="galleryList"></div><script src="/js/admin-gallery.js"></script>
    </style>
</head>

<body>

    <div class="admin-container">
        <h2>Create New Post</h2>

        <form id="postForm">
            <input type="text" id="title" placeholder="Post Title" required>

            <textarea id="content" placeholder="Post Content" rows="5" required></textarea>

            <select id="category" required>
                <option value="">Select Category</option>
                <option value="scouts">Scouts</option>
                <option value="divinity">Divinity</option>
                <option value="devotional">Devotional</option>
            </select>

            <button type="submit">Publish Post</button>
        </form>

        <div class="message" id="message"></div>
    </div>

    <script>
        const form = document.getElementById("postForm");
        const message = document.getElementById("message");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const title = document.getElementById("title").value.trim();
            const content = document.getElementById("content").value.trim();
            const category = document.getElementById("category").value;

            if (!title || !content || !category) {
                message.style.color = "red";
                message.textContent = "All fields are required.";
                return;
            }

            try {
                const response = await fetch("http://localhost:5000/api/posts", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ title, content, category })
                });

                if (!response.ok) {
                    throw new Error("Failed to create post");
                }

                const data = await response.json();

                message.style.color = "green";
                message.textContent = "Post published successfully!";

                form.reset();

                console.log("Saved:", data);

            } catch (error) {
                message.style.color = "red";
                message.textContent = "Error publishing post.";
                console.error(error);
            }
        });
    </script>

</body>

</html>
