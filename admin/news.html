<h2>Admin - SRM Buzz Updates</h2>

<form id="news-form" enctype="multipart/form-data">
    <input type="file" name="image" required />
    <input type="text" name="title" placeholder="News title" required />
    <textarea name="content" placeholder="News content" required></textarea>
    <button type="submit">Post News</button>
</form>

<div id="admin-news-container"></div>

<script src="/js/admin-news.js"></script>
